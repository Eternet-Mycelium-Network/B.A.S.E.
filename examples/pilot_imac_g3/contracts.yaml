# iMac G3 synth — MacIO/OF placeholder @ 0x80000000
- name: macio_gpio_init
  steps:
    - event_type: mmio_write
      address: 0x80000000
      value: 1
      tolerance_ns: 100
    - event_type: mmio_read
      address: 0x80000004
      value: null
      tolerance_ns: 200
  max_total_ns: 5000
  max_step_ns: 3000
  order: Strict

- name: of_claim
  steps:
    - event_type: mmio_write
      address: 0x80000010
      value: 1
      tolerance_ns: 50
  max_total_ns: 2000
  max_step_ns: 1500
  order: Strict
