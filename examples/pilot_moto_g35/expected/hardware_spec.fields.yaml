# Allowlist for Moto G35 OS-port assist phase A (synthetic Unisoc UART).

required_top_level:
  - version
  - source
  - cpu
  - memory
  - blocks
  - confidence

required_block_fields:
  - id
  - kind
  - base_address
  - size
  - registers
  - confidence

pilot_notes:
  classify: uart
  base_address: 0xA9000000
  mmio_source: mmio.json
  soc: unisoc_t760_synth
  os_port_assist: true
  not: "TaurOS complete port"
