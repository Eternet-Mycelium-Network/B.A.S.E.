# Manifest — Moto G35 5G OS-port validation assist (≠ TaurOS turnkey)

target:
  device: moto_g35_5g
  soc: Unisoc T760
  isa: aarch64
  stock_os: Android 14
  port_os: TaurOS  # build externo — não gerado pelo B.A.S.E.

phases:
  A: forense_contracts   # run.sh
  B: qemu_smoke          # run_qemu_smoke.sh
  C: hardware_boot       # SOP.md + hw_boot_receipt

fixtures:
  boot_img: boot.img     # ANDROID! synth ou dump real
  mmio: mmio.json
  contracts: contracts.yaml

honesty:
  auto_fix_complete: false
  production: false
  generates_tauros: false
