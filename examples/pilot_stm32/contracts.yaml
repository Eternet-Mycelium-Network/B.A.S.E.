# STM32F103 USART1 @ 0x40013800 (APB2) — wedges v0.5 U1
- name: usart_init_to_tx
  steps:
    - event_type: mmio_write
      address: 0x4001380c
      value: 8196
      tolerance_ns: 100
    - event_type: mmio_read
      address: 0x40013800
      value: null
      tolerance_ns: 200
    - event_type: irq
      address: 0x25
      value: null
      tolerance_ns: 200
  max_total_ns: 5000
  max_step_ns: 3000
  order: Strict

- name: usart_tx_byte
  steps:
    - event_type: mmio_write
      address: 0x40013804
      value: 65
      tolerance_ns: 50
    - event_type: irq
      address: 0x25
      value: null
      tolerance_ns: 100
  max_total_ns: 2000
  max_step_ns: 1500
  order: Strict
